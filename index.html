        /* ১. গুগল টপ বার হাইড করার জন্য শক্তিশালী কোড */

        .goog-te-banner-frame, 
        iframe[name="goog-te-banner-frame"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ২. বডি যেন নিচে নেমে না যায় (ফিক্স) */

            position: static !important;

        /* ৩. মাউস নিলে পপআপ/টুলটিপ হাইড করা */

        .goog-tooltip:hover {
            display: none !important;
        }

        /* ৪. টেক্সট হাইলাইট বা নীল বর্ডার রিমুভ */
        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important; 
            box-shadow: none !important;
        }

        /* ৫. গুগল লোগো বা গ্যাজেট হাইড */
        .goog-logo-link {
            display: none !important;
        }
        .goog-te-gadget {
            color: transparent !important;
            font-size: 0 !important;
        }

        /* ৬. গুগল ট্রান্সলেট উইজেট সম্পূর্ণ হাইড */
        #google_translate_element,
        .goog-te-combo,
        .goog-te-menu-value,
        .goog-te-menu-frame,
        .goog-te-balloon-frame {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        /* ৭. স্কিপট্রান্সলেট ক্লাস সব হাইড */
        .skiptranslate {
            display: none !important;
        }

        /* ৮. গুগল ট্রান্সলেট বার সম্পূর্ণ রিমুভ */
        body > .skiptranslate,
        body > .goog-te-banner-frame {
            display: none !important;
        }
    </style>

<body>

    <!-- রিঅ্যাক্ট অ্যাপ্লিকেশনটি রেন্ডার করার মেইন রুট কন্টেইনার -->

    <!-- ৩য় পক্ষের এক্সটার্নাল স্ক্রিপ্ট সমূহ (Owl Carousel এবং Isotope এর জন্য প্রয়োজনীয়) -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.isotope/3.0.6/isotope.pkgd.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- গুগল ট্রান্সলেট কোড ও গ্লোবাল কনফিগারেশন -->
    <script type="text/javascript">
        // ১. ভাষা পরিবর্তন করার গ্লোবাল লজিক (কুকি + localStorage)
        window.changeLanguage = function(lang) {
            if (lang === 'bn') {
                try { localStorage.setItem('siteLang', 'bn'); } catch (e) {}
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=" + document.domain + "; path=/;";
                document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; domain=." + document.domain + "; path=/;";
            } else {
                try { localStorage.setItem('siteLang', 'en'); } catch (e) {}
                document.cookie = "googtrans=/bn/en; path=/;";
                document.cookie = "googtrans=/bn/en; domain=" + document.domain + "; path=/;";
                document.cookie = "googtrans=/bn/en; domain=." + document.domain + "; path=/;";
            }
            window.location.reload();
        };

        // ২. গুগল ট্রান্সলেট ইনিশিয়ালাইজ করা (HTTPS প্রোটোকল নিশ্চিত করা হয়েছে)
        window.googleTranslateElementInit = function() {
            new google.translate.TranslateElement({
                pageLanguage: 'bn',
                includedLanguages: 'bn,en',
                autoDisplay: false
            }, 'google_translate_element');
            
            // গুগল ট্রান্সলেট বার সম্পূর্ণভাবে হাইড করা
            setTimeout(function() {
                var googleBar = document.querySelector('.goog-te-banner-frame');
                if (googleBar) {
                    googleBar.style.display = 'none';
                }
                document.body.style.top = '0';
            }, 100);
        };
        
        // ৩. পেজ লোড হওয়ার পর গুগল বার নিয়মিত চেক করা ও রিমুভ রাখা
        window.addEventListener('load', function() {
            setInterval(function() {
                var frames = document.querySelectorAll('iframe.goog-te-banner-frame, .skiptranslate iframe');
                frames.forEach(function(frame) {
                    frame.style.display = 'none';
                    frame.style.visibility = 'hidden';
                });
                
                if (document.body.style.top !== '0px') {
                    document.body.style.top = '0px';
                }
            }, 500);
        });
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
